syntax = "proto3";

package elephant;

message QueryRequest {
  repeated string providers = 1;
  string query = 2;
  int32 maxresults = 3;
  bool exactsearch = 4;
}

message QueryResponse {
  string query = 1;

  enum Type {
    REGULAR = 0;
    FILE = 1;
  }

  message Item {
    message FuzzyInfo {
      int32 start = 1;
      string field = 2;
      repeated int32 positions = 3;
    }

    string identifier = 1;
    string text = 2;
    string subtext = 3;
    string icon = 4;
    string provider = 5;
    int32 score = 6;
    FuzzyInfo fuzzyinfo = 7;
    Type type = 8;
    string mimetype = 9;
    string preview = 10;
    string preview_type = 11;
    repeated string state = 12;
    repeated string actions = 13;
  }

  Item item = 2;
  int32 qid = 3;
}

message ActivateRequest {
  string provider = 1;
  string identifier = 2;
  string action = 3;
  string query = 4;
  string arguments = 5;
  bool single = 6;
}
